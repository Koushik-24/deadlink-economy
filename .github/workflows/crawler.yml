name: Daily Domain Crawler

on:
  schedule:
    - cron: '0 2 * * *'  # runs every day at 2am UTC automatically
  workflow_dispatch:       # also allows manual trigger from GitHub Actions tab

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary

      - name: Run domain crawler
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OPEN_PR_API_KEY: ${{ secrets.OPEN_PR_API_KEY }}
        run: python3 crawler.py

      - name: Print crawler stats
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          OPEN_PR_API_KEY: ${{ secrets.OPEN_PR_API_KEY }}
        run: python3 crawler.py stats
